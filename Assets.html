<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Gold - Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* الألوان المعتمدة منك */
            --main-gold: rgb(238, 210, 154);
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            /* تطبيق تدرج البني اللي حددته */
            background: radial-gradient(circle at center, #a44a0a 0%, #5a1f07 50%, #2b0f05 100%);
            color: var(--main-gold);
            font-family: initial; /* الخط اللي طلبته */
            font-weight: bold;    /* الوزن اللي طلبته */
            margin: 0;
            min-height: 100vh;
        }

        .navbar { border-bottom: 1px solid rgba(238, 210, 154, 0.1); padding: 15px 0; }
        .logo { color: var(--main-gold) !important; font-size: 1.5rem; text-decoration: none; }
        .nav-link { color: var(--main-gold) !important; opacity: 0.8; }

        .overview-card {
            background: var(--card-bg);
            border: 1px solid rgba(238, 210, 154, 0.2);
            border-radius: 24px;
            padding: 40px;
            margin: 30px 0 50px 0;
            backdrop-filter: blur(10px);
        }

        .asset-square-card {
            background: var(--card-bg);
            border: 1px solid rgba(238, 210, 154, 0.1);
            border-radius: 24px;
            padding: 25px;
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.3s ease;
        }

        .asset-square-card:hover {
            border-color: var(--main-gold);
            background: rgba(255, 255, 255, 0.08);
        }

        .karat-badge {
            color: var(--main-gold);
            border: 1px solid var(--main-gold);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .price-text { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #fff; }
        .profit { color: #00ff88; }
        .loss { color: #ff4d4d; }

        .btn-add-assets {
            background-color: var(--main-gold);
            color: #2b0f05;
            font-weight: bold;
            border-radius: 12px;
            padding: 10px 25px;
            border: none;
            text-decoration: none;
            display: inline-block;
        }

        .form-control {
            background: var(--card-bg);
            border: 1px solid rgba(238, 210, 154, 0.2);
            color: var(--main-gold);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand logo" href="#">LIVE GOLD</a>
        </div>
    </nav>

    <main class="container">
        <div class="overview-card">
            <p class="small text-uppercase mb-1">Total Portfolio Balance</p>
            <h1 class="display-3 fw-bold mb-2 text-white">$148,930.50</h1>
            <span class="profit">▲ +11.2% Growth</span>
        </div>

        <div class="row align-items-center mb-4">
            <div class="col-md-5">
                <h2 class="h4 m-0 text-uppercase fw-bold">My Holdings</h2>
            </div>
            <div class="col-md-4 mt-3 mt-md-0">
                <input type="text" id="searchInput" class="form-control" placeholder="🔍 Search assets...">
            </div>
            <div class="col-md-3 text-md-end mt-3 mt-md-0">
                <a href="add-asset.html" class="btn-add-assets w-100 text-center">+ Add Assets</a>
            </div>
        </div>
        <div class="row g-4" id="assetsGrid"></div>
    </main>

    <script>
        function getAssets() {
            const saved = localStorage.getItem('myGoldAssets');
            return saved ? JSON.parse(saved) : [
                { id: 1, name: "Investment Bar", weight: "10oz", karat: "24K", price: "$23,354", change: "0.3%", isProfit: true },
                { id: 2, name: "Wedding Ring", weight: "5g", karat: "21K", price: "$11,957", change: "1.1%", isProfit: true }
            ];
        }

        function renderAssets(assetsToShow) {
            const grid = document.getElementById('assetsGrid');
            grid.innerHTML = assetsToShow.map(item => `
                <div class="col-lg-4 col-md-6">
                    <div class="asset-square-card">
                        <div class="d-flex justify-content-between">
                            <div style="font-size: 1.5rem;">📀</div>
                            <span class="karat-badge">${item.karat}</span>
                        </div>
                        <div class="mt-3">
                            <h5 class="mb-1 fw-bold">${item.name}</h5>
                            <p class="small mb-0" style="opacity: 0.7">${item.weight} / Pure Gold</p>
                        </div>
                        <div class="d-flex justify-content-between align-items-end mt-4">
                            <h4 class="price-text m-0">${item.price}</h4>
                            <span class="${item.isProfit ? 'profit' : 'loss'}">${item.isProfit ? '▲' : '▼'} ${item.change}</span>
                        </div>
                    </div>
                </div>`).join('');
        }

        window.onload = () => {
            const allAssets = getAssets();
            renderAssets(allAssets);
            document.getElementById('searchInput').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                renderAssets(allAssets.filter(item => item.name.toLowerCase().includes(term)));
            };
        };
    </script>
</body>
</html>
